# Pallet Detector Parameters
# Parameter names must match pnh_.param("name", ...) calls in pallet_detector_node.cpp
#
# Axis convention (camera optical frame):
#   x = left/right (side)
#   y = up/down (vertical)
#   z = forward (depth)

# ----- ROI -----
x_min: -1.5
x_max: 1.5
y_min: 0.2
y_max: 1.0
z_min: 1.0
z_max: 3.5

# Voxel downsampling
voxel_leaf: 0.02

# Statistical Outlier Removal (SOR)
use_sor: false
sor_mean_k: 30
sor_stddev: 1.0

# Plane removal (dominant plane, e.g. floor)
plane_dist_thresh: 0.02
plane_max_iters: 100

# Euclidean clustering
cluster_tolerance: 0.05
cluster_min_size: 500
cluster_max_size: 200000

# Expected pallet dimensions (meters) — width and height used for post-OBB gate
pallet_width: 0.80
pallet_height: 0.145
tol_width: 0.10
tol_height: 0.08

# Front-face template matching (Xiao et al. 2017 style)
tpl_cell_size: 0.02         # 2D grid resolution (m/cell)
chi_threshold: 0.40         # minimum chi score to accept a cluster as a pallet

# EUR/EPAL pallet end-face geometry — solid block definitions matching model.sdf
# Template is built from feature blocks (paper approach): each block = solid rectangle on face.
# Stringer layout (0-based, left to right): x=0..0.10, x=0.35..0.45, x=0.70..0.80
tpl_stringer_width: 0.10    # width of each of the 3 stringers (m) — from SDF collision size y=0.10
tpl_top_deck_height: 0.04   # top deck height (m) — from SDF collision size z=0.04
tpl_stringer_height: 0.06   # stringer zone height visible above floor (m) — physical is 0.10 but bottom rows near floor

